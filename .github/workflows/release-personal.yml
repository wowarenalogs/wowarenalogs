name: release-personal
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v12.7.0-r1)'
        required: true
        type: string
jobs:
  build_and_release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ''
      CSC_KEY_PASSWORD: ''
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install node-gyp
        run: npm i -g node-gyp@latest
      - name: install dependencies
        run: npm ci --legacy-peer-deps
      - name: set version from tag
        shell: pwsh
        run: |
          $version = "${{ inputs.tag }}".TrimStart('v')
          npm version $version --no-git-tag-version --allow-same-version
      - name: build and publish for windows
        run: npm run publish:app:windows
