name: build-app
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_on_win:
        description: Build the Windows job
        required: false
        default: false
        type: boolean
      build_on_linux:
        description: Build the Linux job
        required: false
        default: false
        type: boolean
      build_on_mac:
        description: Build the macOS job
        required: false
        default: true
        type: boolean
jobs:
  build_on_win:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.build_on_win
    # Pinned to windows-2022 (Visual Studio 2022 / v17). `windows-latest` rolled
    # to the windows-2025-vs2026 image (Visual Studio 18), which the old
    # node-gyp 9.x that builds noobs's native addon can't detect ("unknown
    # version" -> "could not find a version of Visual Studio 2017 or newer"),
    # so npm silently drops the optional noobs subtree and copyNoobs fails the
    # build. VS2022 is the toolchain this build last succeeded on.
    runs-on: windows-2022
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ''
      CSC_KEY_PASSWORD: ''
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: setup python 3.11 for node-gyp
        # noobs's native addon is built from source by `node-gyp rebuild` during
        # `npm ci`. The node-gyp that runs it is the 9.x hoisted into the repo's
        # node_modules (resolved from node_modules/.bin), and node-gyp 9.x imports
        # Python's `distutils` — which the stdlib removed in 3.12. The runner
        # otherwise auto-discovers a 3.12+ Python, the configure step throws
        # `No module named 'distutils'`, and npm silently rolls back the
        # *optional* noobs subtree — shipping a recorder with no OBS binaries
        # (copyNoobs then fails the build).
        #
        # Python 3.11 still ships stdlib distutils, so we install it and force
        # node-gyp onto this exact interpreter via PYTHON / npm_config_python
        # below (PATH alone isn't enough — node-gyp picks its own interpreter).
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: clean npm cache
        run: npm cache clean -f
      - name: install dependencies
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          npm_config_python: ${{ steps.setup-python.outputs.python-path }}
        # --foreground-scripts surfaces noobs's node-gyp output inline; without it
        # npm hides the build error and silently rolls back the optional subtree.
        run: npm ci --foreground-scripts
      - name: build for windows
        run: npm run build:app:windows
  build_on_mac:
    if: >-
      github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch' && inputs.build_on_mac
    runs-on: macos-latest
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_FOR_PULL_REQUEST: true
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: inst
        run: pip install requests
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: update node_canvas deps
        run: brew install pkg-config cairo pango libpng jpeg giflib librsvg
      - name: install node-gyp
        run: npm i -g node-gyp@latest
      - name: clean npm cache
        run: npm cache clean -f
      - name: install dependencies
        run: npm ci
      - name: install dmg-license
        run: npm i dmg-license
      - name: build for mac
        run: npm run build:app:mac
      - name: verify app signature
        run: |
          set -euo pipefail
          APP_PATH=$(find dist/mac-arm64 -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in dist/mac-arm64"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | tee /tmp/codesign.log
          grep -q "TeamIdentifier=${APPLE_TEAM_ID}" /tmp/codesign.log
          spctl --assess --type execute --verbose=4 "$APP_PATH"
      - name: validate app notarization
        run: |
          set -euo pipefail
          APP_PATH=$(find dist/mac-arm64 -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in dist/mac-arm64"
            exit 1
          fi
          xcrun stapler validate "$APP_PATH"
  build_on_linux:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.build_on_linux
    runs-on: ubuntu-latest
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev libpixman-1-dev
      - name: install node-gyp
        run: npm i -g node-gyp@latest
      - name: clean npm cache
        run: npm cache clean -f
      - name: install dependencies
        run: npm ci
      - name: build for linux
        run: npm run build:app:linux
