name: build-app
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_on_win:
        description: Build the Windows job
        required: false
        default: false
        type: boolean
      build_on_linux:
        description: Build the Linux job
        required: false
        default: false
        type: boolean
      build_on_mac:
        description: Build the macOS job
        required: false
        default: true
        type: boolean
jobs:
  build_on_win:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.build_on_win
    runs-on: windows-latest
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ''
      CSC_KEY_PASSWORD: ''
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # ---- DIAGNOSTIC BRANCH (#496): prove distutils root cause + validate core fix ----
      - name: baseline — verbose gyp configure error (expect distutils)
        shell: bash
        run: |
          set +e
          python --version; python -c "import distutils" 2>&1 | head -2 || echo "distutils import FAILS"
          npm install noobs@0.0.184 --no-save --foreground-scripts --verbose > base.log 2>&1
          echo "## baseline noobs build exit=$?"
          grep -iE "distutils|ModuleNotFound|No module|ImportError|Traceback|configure error" base.log | tail -20
      - name: core-fix candidate — restore distutils via setuptools
        shell: bash
        run: |
          python -m pip install --upgrade setuptools
          python -c "import distutils; print('distutils now OK:', distutils.__file__)"
      - name: retry noobs build with distutils restored
        if: always()
        shell: bash
        run: |
          set +e
          npm install noobs@0.0.184 --no-save --foreground-scripts > fixed.log 2>&1
          echo "## after-setuptools build exit=$?"
          ls node_modules/noobs/dist/noobs.node >/dev/null 2>&1 && echo "## noobs build OK" || echo "## noobs still failing"
          grep -iE "gyp info ok|gyp ERR|configure error|distutils" fixed.log | tail -10
      - name: does a full npm ci now install noobs?
        if: always()
        shell: bash
        run: |
          set +e
          npm cache clean -f
          npm ci > ci.log 2>&1
          echo "## npm ci exit=$?"
          ls node_modules/noobs/dist/noobs.node >/dev/null 2>&1 \
            && echo "## RESULT: npm ci INSTALLED noobs — setuptools is a valid core fix" \
            || echo "## RESULT: noobs still ABSENT after npm ci"
  build_on_mac:
    if: >-
      github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch' && inputs.build_on_mac
    runs-on: macos-latest
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_FOR_PULL_REQUEST: true
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: inst
        run: pip install requests
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: update node_canvas deps
        run: brew install pkg-config cairo pango libpng jpeg giflib librsvg
      - name: install node-gyp
        run: npm i -g node-gyp@latest
      - name: clean npm cache
        run: npm cache clean -f
      - name: install dependencies
        run: npm ci
      - name: install dmg-license
        run: npm i dmg-license
      - name: build for mac
        run: npm run build:app:mac
      - name: verify app signature
        run: |
          set -euo pipefail
          APP_PATH=$(find dist/mac-arm64 -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in dist/mac-arm64"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | tee /tmp/codesign.log
          grep -q "TeamIdentifier=${APPLE_TEAM_ID}" /tmp/codesign.log
          spctl --assess --type execute --verbose=4 "$APP_PATH"
      - name: validate app notarization
        run: |
          set -euo pipefail
          APP_PATH=$(find dist/mac-arm64 -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in dist/mac-arm64"
            exit 1
          fi
          xcrun stapler validate "$APP_PATH"
  build_on_linux:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.build_on_linux
    runs-on: ubuntu-latest
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev libpixman-1-dev
      - name: install node-gyp
        run: npm i -g node-gyp@latest
      - name: clean npm cache
        run: npm cache clean -f
      - name: install dependencies
        run: npm ci
      - name: build for linux
        run: npm run build:app:linux
