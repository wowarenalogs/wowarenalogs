name: build-app
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_on_win:
        description: Build the Windows job
        required: false
        default: false
        type: boolean
      build_on_linux:
        description: Build the Linux job
        required: false
        default: false
        type: boolean
      build_on_mac:
        description: Build the macOS job
        required: false
        default: true
        type: boolean
jobs:
  build_on_win:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.build_on_win
    runs-on: windows-latest
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ''
      CSC_KEY_PASSWORD: ''
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # ---- DIAGNOSTIC BRANCH (#496): understand why npm ci drops optional noobs ----
      - name: env + npm config
        shell: bash
        run: |
          echo "## node/npm"; node -v; npm -v
          echo "## NODE_ENV=[$NODE_ENV]"
          echo "## npm_config_* env vars:"; env | grep -i npm_config || echo "  (none)"
          echo "## effective npm config (omit/optional/production/strategy):"
          npm config ls -l 2>&1 | grep -iE "omit|optional|production|legacy|install-strategy|workspace|prefer" || echo "  (none matched)"
      - name: clean npm cache
        shell: bash
        run: npm cache clean -f
      - name: npm ci (capture verbose, do not fail job)
        shell: bash
        run: |
          set +e
          npm ci --loglevel=verbose > ci.out 2> ci.err
          echo "## npm ci exit=$?"
          echo "## summary:"; tail -3 ci.out
          echo "## lines mentioning noobs/optional/prune/reify/omit/skip:"
          grep -iE "noobs|optional|prune|reify|omit|skip" ci.err | grep -ivE "deprecated" | tail -80
          echo "## (end)"
      - name: what is actually missing?
        if: always()
        shell: bash
        run: |
          echo "## noobs present?"; ls node_modules/noobs/dist/noobs.node 2>&1 || echo "  MISSING"
          echo "## node-addon-api (top level)?"; ls -d node_modules/node-addon-api 2>&1 || echo "  not hoisted"
          echo "## npm ls noobs:"; npm ls noobs 2>&1 | head -5
          echo "## ALL unmet/missing/invalid across the tree (user concern: other pkgs):"
          npm ls --all 2>&1 | grep -iE "UNMET|missing|invalid|extraneous" | head -60 || echo "  none reported"
      - name: experiment — does --include=optional fix it?
        if: always()
        shell: bash
        run: |
          set +e
          npm ci --include=optional > ci2.out 2>&1
          echo "## exit=$?"
          ls node_modules/noobs/dist/noobs.node 2>&1 && echo "  FIXED by --include=optional" || echo "  STILL MISSING"
  build_on_mac:
    if: >-
      github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch' && inputs.build_on_mac
    runs-on: macos-latest
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_FOR_PULL_REQUEST: true
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: inst
        run: pip install requests
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: update node_canvas deps
        run: brew install pkg-config cairo pango libpng jpeg giflib librsvg
      - name: install node-gyp
        run: npm i -g node-gyp@latest
      - name: clean npm cache
        run: npm cache clean -f
      - name: install dependencies
        run: npm ci
      - name: install dmg-license
        run: npm i dmg-license
      - name: build for mac
        run: npm run build:app:mac
      - name: verify app signature
        run: |
          set -euo pipefail
          APP_PATH=$(find dist/mac-arm64 -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in dist/mac-arm64"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | tee /tmp/codesign.log
          grep -q "TeamIdentifier=${APPLE_TEAM_ID}" /tmp/codesign.log
          spctl --assess --type execute --verbose=4 "$APP_PATH"
      - name: validate app notarization
        run: |
          set -euo pipefail
          APP_PATH=$(find dist/mac-arm64 -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in dist/mac-arm64"
            exit 1
          fi
          xcrun stapler validate "$APP_PATH"
  build_on_linux:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.build_on_linux
    runs-on: ubuntu-latest
    env:
      CI: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev libpixman-1-dev
      - name: install node-gyp
        run: npm i -g node-gyp@latest
      - name: clean npm cache
        run: npm cache clean -f
      - name: install dependencies
        run: npm ci
      - name: build for linux
        run: npm run build:app:linux
