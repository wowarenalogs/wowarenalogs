name: perf-bench
on:
  pull_request:
    branches:
      - main
jobs:
  parser_perf:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    env:
      CI: false
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev libpixman-1-dev
      - name: install mac dependencies
        if: runner.os == 'macOS'
        run: brew install pkg-config cairo pango libpng jpeg giflib librsvg
      - name: install node-gyp
        run: npm i -g node-gyp@latest
      - name: update path variables
        if: runner.os == 'Windows'
        run: set 'path=%path%;C:\Program Files (x86)\Microsoft Visual Studio\2017\Enterprise\MSBuild\Current\Bin'
      - name: clean npm cache
        run: npm cache clean -f
      - name: install dependencies
        run: npm ci
      - name: build parser
        run: npm run build:parser --workspace @wowarenalogs/parser
      - name: perf bench
        run: npm run perf:bench --workspace @wowarenalogs/parser
      - name: lookup baseline artifact
        id: baseline
        uses: actions/github-script@v7
        with:
          script: |
            const workflowName = 'perf-bench';
            const osName = '${{ matrix.os }}';
            const artifactName = `parser-perf-${osName}`;
            const branch = 'main';

            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: 'success',
              branch,
              per_page: 30,
            });

            const workflowRun = runs.data.workflow_runs.find((run) => run.name === workflowName);
            if (!workflowRun) {
              core.setFailed(`No successful ${workflowName} runs found on ${branch}`);
              return;
            }

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: workflowRun.id,
            });

            const artifact = artifacts.data.artifacts.find((item) => item.name === artifactName);
            if (!artifact) {
              core.setFailed(`No artifact named ${artifactName} in run ${workflowRun.id}`);
              return;
            }

            core.setOutput('artifact_id', String(artifact.id));
            core.setOutput('artifact_name', artifactName);
            core.setOutput('run_id', String(workflowRun.id));
      - name: download baseline artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p /tmp/baseline
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${{ steps.baseline.outputs.artifact_id }}/zip" \
            --output /tmp/baseline.zip
          unzip -q /tmp/baseline.zip -d /tmp/baseline
      - name: download baseline artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\baseline | Out-Null
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
          }
          $zipPath = "C:\baseline.zip"
          Invoke-WebRequest -Uri "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${{ steps.baseline.outputs.artifact_id }}/zip" -OutFile $zipPath -Headers $headers
          Expand-Archive -Path $zipPath -DestinationPath C:\baseline -Force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: compare perf results
        if: runner.os != 'Windows'
        run: node packages/parser/scripts/compare-perf.js /tmp/baseline packages/parser/perf/results "${{ matrix.os }}"
      - name: compare perf results (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: node packages/parser/scripts/compare-perf.js C:\baseline packages/parser/perf/results "${{ matrix.os }}"
      - name: upload perf comparison
        uses: actions/upload-artifact@v4
        with:
          name: parser-perf-compare-${{ matrix.os }}
          path: packages/parser/perf/results/perf-compare-${{ matrix.os }}.md
      - name: upload perf results
        uses: actions/upload-artifact@v4
        with:
          name: parser-perf-${{ matrix.os }}
          path: packages/parser/perf/results/*.json
